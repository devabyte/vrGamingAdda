name: Deploy TableOrder

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inject secrets into index.html
        run: |
          sed -i "s|__SCRIPT_URL__|${{ secrets.SCRIPT_URL }}|g" index.html
          sed -i "s|__APP_PIN__|${{ secrets.APP_PIN }}|g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github'
